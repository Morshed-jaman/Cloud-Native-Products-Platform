name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-ci:
    name: backend-ci
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app_password
          POSTGRES_DB: products_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U app -d products_db"
          --health-interval=5s --health-timeout=5s --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s --health-timeout=5s --health-retries=10
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint if configured
        run: |
          if node -e "process.exit(require('./package.json').scripts?.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "no lint script"
          fi

      - name: Prepare test database
        run: |
          docker run --rm --network host \
            -v "$GITHUB_WORKSPACE/backend/migrations:/migrations:ro" \
            -e PGPASSWORD=app_password \
            postgres:16-alpine \
            psql -h 127.0.0.1 -U app -d products_db -f /migrations/001_create_products.sql

      - name: Run tests
        env:
          DATABASE_URL: postgresql://app:app_password@localhost:5432/products_db
          REDIS_URL: redis://localhost:6379
        run: npm test

      - name: Build backend
        run: npm run build

  frontend-ci:
    name: frontend-ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  helm-validate:
    name: helm-validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint k8s/charts/products

      - name: Render Helm chart
        run: helm template products k8s/charts/products

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64
          push: false
          tags: products-backend:ci
          outputs: type=docker,dest=/tmp/products-backend.tar

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64
          push: false
          tags: products-frontend:ci
          build-args: |
            VITE_API_URL=http://localhost:8081
          outputs: type=docker,dest=/tmp/products-frontend.tar

      - name: Upload backend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: products-backend-image
          path: /tmp/products-backend.tar
          retention-days: 1

      - name: Upload frontend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: products-frontend-image
          path: /tmp/products-frontend.tar
          retention-days: 1

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Download built image artifacts
        uses: actions/download-artifact@v4
        with:
          path: image-artifacts

      - name: Load built images
        run: |
          docker load --input image-artifacts/products-backend-image/products-backend.tar
          docker load --input image-artifacts/products-frontend-image/products-frontend.tar
          docker image ls products-backend
          docker image ls products-frontend

      - name: Scan backend image for critical vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: products-backend:ci
          vuln-type: os,library
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1
          format: table

      - name: Scan frontend image for critical vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: products-frontend:ci
          vuln-type: os,library
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1
          format: table
