name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  FRONTEND_VITE_API_URL: http://localhost:8081

jobs:
  publish-images:
    name: publish-images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image names
        id: images
        run: |
          image_namespace="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "backend=${REGISTRY}/${image_namespace}/products-backend" >> "$GITHUB_OUTPUT"
          echo "frontend=${REGISTRY}/${image_namespace}/products-frontend" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.images.outputs.backend }}:${{ github.ref_name }}
            ${{ steps.images.outputs.backend }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          build-args: |
            VITE_API_URL=${{ env.FRONTEND_VITE_API_URL }}
          tags: |
            ${{ steps.images.outputs.frontend }}:${{ github.ref_name }}
            ${{ steps.images.outputs.frontend }}:latest
