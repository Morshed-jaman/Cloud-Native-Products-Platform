apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: products
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: localhost:5001/postgres:16-alpine
          imagePullPolicy: Always
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: products-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: products-secrets
                  key: POSTGRES_DB
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                echo "waiting for postgres"
                sleep 2
              done
        - name: wait-for-redis
          image: localhost:5001/redis:7-alpine
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              until redis-cli -h redis -p 6379 ping | grep PONG; do
                echo "waiting for redis"
                sleep 2
              done
      containers:
        - name: backend
          image: localhost:5001/products-backend:local
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4000
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: products-config
                  key: PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: products-config
                  key: NODE_ENV
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: products-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: products-config
                  key: REDIS_URL
            - name: FRONTEND_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: products-config
                  key: FRONTEND_ORIGIN
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
