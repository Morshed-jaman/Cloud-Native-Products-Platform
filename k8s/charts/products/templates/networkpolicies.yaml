      ports:
        - protocol: TCP
          port: {{ .Values.postgres.containerPort }}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-policy
  namespace: {{ include "products.namespace" . }}
  labels:
    {{- include "products.componentLabels" (dict "root" . "component" "redis") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
