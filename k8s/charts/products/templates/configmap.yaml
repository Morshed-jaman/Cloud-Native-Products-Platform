apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "products.configName" . }}
  namespace: {{ include "products.namespace" . }}
  labels:
    {{- include "products.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  PORT: {{ .Values.config.port | quote }}
  REDIS_URL: {{ .Values.config.redisUrl | quote }}
  FRONTEND_ORIGIN: {{ .Values.config.frontendOrigin | quote }}
  VITE_API_URL: {{ .Values.config.viteApiUrl | quote }}
