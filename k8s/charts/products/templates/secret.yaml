apiVersion: v1
kind: Secret
metadata:
  name: {{ include "products.secretName" . }}
  namespace: {{ include "products.namespace" . }}
  labels:
    {{- include "products.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.auth.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | quote }}
  POSTGRES_DB: {{ .Values.postgres.auth.database | quote }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s:%d/%s" .Values.postgres.auth.user .Values.postgres.auth.password .Values.postgres.name (.Values.postgres.service.port | int) .Values.postgres.auth.database | quote }}
